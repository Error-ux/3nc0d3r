name: Deploy Read-Only Telemetry Monitor

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Python (for script-based injection)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🔑 Inject Secrets into index.html & dashboard.html
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_TOKEN: ${{ secrets.REDIS_TOKEN }}
          GH_PAT: ${{ secrets.TG_API_HASH }} # fallback or use default GITHUB_TOKEN
        run: |
          python3 -c "
          import os
          
          url = os.environ.get('REDIS_URL', '').strip()
          token = os.environ.get('REDIS_TOKEN', '').strip()
          owner = '${{ github.repository_owner }}'
          repo = '${{ github.event.repository.name }}'
          # Use GITHUB_TOKEN for read-only actions fetching inside the web app
          gh_token = ''
          
          for filename in ['index.html', 'dashboard.html']:
              if not os.path.exists(filename):
                  continue
              with open(filename, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Replace placeholders
              content = content.replace('{{INJECTED_REDIS_URL}}', url)
              content = content.replace('{{INJECTED_REDIS_TOKEN}}', token)
              content = content.replace('{{INJECTED_GH_TOKEN}}', gh_token)
              content = content.replace('{{INJECTED_GH_OWNER}}', owner)
              content = content.replace('{{INJECTED_GH_REPO}}', repo)
              
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(content)
                  
          print('✅ Secrets successfully injected into deployment build.')
          "

      - name: 🚀 Deploy to GitHub Pages (gh-pages branch)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          clean: true
