<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3nc0d3r // NEURAL-LINK CONTROL PANEL</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-amber: #f59e0b;
            --neon-yellow: #fcee0a;
            --neon-red: #ff3333;
            --neon-green: #00f5a0;
            --dark-bg: #050505;
            --dark-card: rgba(10, 10, 12, 0.85);
            --border-light: rgba(0, 243, 255, 0.15);
            --grid-size: 35px;
            
            --glow-cyan: 0 0 15px rgba(0, 243, 255, 0.35);
            --glow-amber: 0 0 15px rgba(245, 158, 11, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'JetBrains Mono', monospace;
            text-shadow: none !important; /* Clarified text shadows for extreme readability */
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e2e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                linear-gradient(to right, rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            position: relative;
        }

        /* Scanline Overlay */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,243,255,0.02) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.15;
            position: fixed;
            bottom: 100%;
            pointer-events: none;
            animation: scanline 12s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -10%; }
        }

        header {
            border-bottom: 2px solid var(--neon-cyan);
            backdrop-filter: blur(12px);
            background: rgba(5, 5, 5, 0.9);
            padding: 1.2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 243, 255, 0.15);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--dark-bg);
            background: var(--neon-cyan);
            padding: 0.2rem 0.8rem;
            clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%);
            box-shadow: var(--glow-cyan);
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .brand-sub {
            font-size: 0.75rem;
            color: var(--neon-amber);
            font-weight: 700;
            border: 1px solid var(--neon-amber);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            letter-spacing: 1.5px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        /* Cyberpunk Button Shape */
        .cyber-button {
            background: var(--neon-cyan);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding: 0.6rem 1.4rem;
            border: none;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--glow-cyan);
        }

        .cyber-button:hover {
            background: #fff;
            filter: brightness(1.2) drop-shadow(0 0 12px var(--neon-cyan));
            transform: scale(1.03);
        }

        .cyber-button-amber {
            background: var(--neon-amber);
            box-shadow: var(--glow-amber);
        }

        .cyber-button-amber:hover {
            filter: brightness(1.2) drop-shadow(0 0 12px var(--neon-amber));
        }

        main {
            flex: 1;
            max-width: 1500px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem;
            display: grid;
            grid-template-columns: 480px 1fr;
            gap: 2.5rem;
            z-index: 20;
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        /* Industrial Cyberpunk Panel */
        .cyber-panel {
            background: var(--dark-card);
            border: 2px solid var(--neon-cyan);
            position: relative;
            padding: 2rem;
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.08), 0 10px 30px rgba(0,0,0,0.6);
        }

        .cyber-panel-amber {
            border-color: var(--neon-amber);
            box-shadow: inset 0 0 20px rgba(245, 158, 11, 0.08), 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Cyber Cut Corners decoration */
        .cyber-panel::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px;
            width: 15px; height: 15px;
            border-top: 4px solid var(--neon-yellow);
            border-left: 4px solid var(--neon-yellow);
        }

        .cyber-panel::after {
            content: '';
            position: absolute;
            bottom: -2px; right: -2px;
            width: 15px; height: 15px;
            border-bottom: 4px solid var(--neon-yellow);
            border-right: 4px solid var(--neon-yellow);
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(0, 243, 255, 0.2);
            padding-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title.neon-amber {
            color: var(--neon-amber);
            border-bottom-color: rgba(245, 158, 11, 0.2);
        }

        /* Inputs & Labels */
        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--neon-cyan);
            margin-bottom: 0.6rem;
        }

        label.neon-amber {
            color: var(--neon-amber);
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-light);
            border-radius: 0; /* Industrial sharp corners */
            padding: 0.9rem 1.2rem;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.25);
            background: rgba(0, 243, 255, 0.03);
        }

        .form-group-amber input[type="text"]:focus, .form-group-amber select:focus {
            border-color: var(--neon-amber);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.25);
            background: rgba(245, 158, 11, 0.03);
        }

        /* Custom Bitrate and Resolution Input triggers */
        .custom-input-box {
            margin-top: 0.6rem;
            border-left: 2px dashed var(--neon-amber);
            padding-left: 0.8rem;
            animation: slide-down 0.3s ease;
        }

        @keyframes slide-down {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Sliders */
        .slider-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 243, 255, 0.1);
            padding: 1.2rem;
            margin-bottom: 1.4rem;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .slider-val {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: var(--dark-bg);
            background: var(--neon-cyan);
            padding: 0.2rem 0.8rem;
            font-size: 0.9rem;
            box-shadow: var(--glow-cyan);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.2);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 22px;
            background: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            clip-path: polygon(0 20%, 50% 0, 100% 20%, 100% 80%, 50% 100%, 0 80%);
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Toggle Switches */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 243, 255, 0.1);
            padding: 1rem 1.2rem;
            margin-bottom: 1.2rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-switch {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.05);
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 243, 255, 0.2);
        }

        .slider-switch:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: var(--text-secondary);
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:checked + .slider-switch {
            background-color: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-cyan);
        }

        input:checked + .slider-switch:before {
            transform: translateX(24px);
            background-color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }

        /* Launcher Button */
        .btn-launch-cyber {
            width: 100%;
            background: var(--neon-cyan);
            color: #000;
            border: none;
            padding: 1.3rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 3px;
            cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0% 30%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--glow-cyan);
            margin-top: 1rem;
            text-transform: uppercase;
        }

        .btn-launch-cyber:hover {
            background: #fff;
            box-shadow: 0 0 30px rgba(0, 243, 255, 1);
            transform: translateY(-2px);
        }

        /* Config Modal popup styling */
        .config-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .config-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .config-popup {
            width: 550px;
            max-width: 95%;
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .config-overlay.open .config-popup {
            transform: scale(1);
        }

        .config-auto-indicator {
            background: rgba(0, 255, 160, 0.08);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-size: 0.8rem;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.4rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        /* Monitoring & Stats Grid */
        .runs-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .run-card {
            background: rgba(8, 8, 10, 0.9);
            border: 2px solid var(--border-light);
            padding: 1.6rem;
            position: relative;
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.02);
            transition: all 0.3s ease;
        }

        .run-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.05), 0 5px 20px rgba(0,0,0,0.5);
        }

        .run-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .run-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            color: #fff;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .run-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 900;
            padding: 0.25rem 0.8rem;
            letter-spacing: 1px;
        }

        .badge-queued { background: rgba(245, 208, 0, 0.1); border: 1px solid var(--neon-yellow); color: var(--neon-yellow); }
        .badge-active { background: rgba(0, 243, 255, 0.1); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); animation: blink 2s infinite; }
        .badge-success { background: rgba(0, 255, 160, 0.1); border: 1px solid var(--neon-green); color: var(--neon-green); }
        .badge-failed { background: rgba(255, 51, 51, 0.1); border: 1px solid var(--neon-red); color: var(--neon-red); }

        .run-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .stat-item {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.03);
            padding: 0.8rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 900;
            color: #fff;
        }

        .stat-value.neon-cyan { color: var(--neon-cyan); }
        .stat-value.neon-green { color: var(--neon-green); }

        /* Progress Bar */
        .progress-bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 0.4rem;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.2);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple, #7f00ff));
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(
                -45deg, 
                rgba(255, 255, 255, .15) 25%, 
                transparent 25%, 
                transparent 50%, 
                rgba(255, 255, 255, .15) 50%, 
                rgba(255, 255, 255, .15) 75%, 
                transparent 75%, 
                transparent
            );
            background-size: 30px 30px;
            animation: progress-stripes 1.5s linear infinite;
        }

        /* CPU/RAM bars */
        .resources-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .resource-mini-bar {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .mini-progress {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .mini-fill {
            height: 100%;
            background: var(--neon-cyan);
        }

        /* Actions on Cards */
        .card-actions {
            margin-top: 1.2rem;
            display: flex;
            gap: 0.8rem;
        }

        .card-btn {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-light);
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .card-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: var(--glow-cyan);
        }

        .card-btn-danger {
            border-color: rgba(255,51,51,0.3);
            color: var(--neon-red);
        }

        .card-btn-danger:hover {
            background: var(--neon-red);
            color: #fff;
            box-shadow: 0 0 10px rgba(255,51,51,0.5);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6rem 2rem;
            color: var(--text-muted);
            border: 2px dashed rgba(0, 243, 255, 0.15);
            background: rgba(0,0,0,0.2);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1.2rem;
            stroke: rgba(0, 243, 255, 0.25);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .toast {
            background: #000;
            border: 2px solid var(--neon-cyan);
            box-shadow: var(--glow-cyan);
            padding: 1.1rem 1.8rem;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 500;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(0, 255, 160, 0.2); }
        .toast-error { border-color: var(--neon-red); box-shadow: 0 0 15px rgba(255, 51, 51, 0.2); }

        /* Animations */
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        @keyframes progress-stripes {
            from { background-position: 0 0; }
            to { background-position: 30px 0; }
        }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <header>
        <div class="brand">
            <div class="brand-logo">N</div>
            <div class="brand-name">NEOFLOW <span class="brand-sub">AV1</span></div>
        </div>
        <div class="header-actions">
            <button class="cyber-button cyber-button-amber" onclick="toggleConfigPopup(true)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                RESOLVER SECRETS
            </button>
        </div>
    </header>

    <main>
        <!-- Left Panel: Controls Form -->
        <section class="cyber-panel">
            <h2 class="panel-title">
                <span>[ 01 // ENCODER SETUP ]</span>
            </h2>
            <form id="pipeline-form" onsubmit="handleFormSubmit(event)">
                
                <div class="form-group">
                    <label for="video-url">Input Target Video URL</label>
                    <input type="text" id="video-url" placeholder="Paste Telegram link, M3U8, or direct URL..." required>
                </div>

        <!-- Right Panel: Monitoring Panel -->

                    <!-- Cards will be populated dynamically -->

                        <path d="M12 16v-4m0-4h.01"></path>
                    </svg>

    <!-- Overlay Configuration Modal -->
    <div id="config-overlay" class="config-overlay">
        <div class="cyber-panel config-popup" style="border-color: var(--neon-amber);">
            <h2 class="panel-title neon-amber" style="margin-bottom: 1.5rem; justify-content: space-between;">
                <span>[ RESOLVER SETUP ]</span>
                <button onclick="toggleConfigPopup(false)" style="background:none; border:none; color:var(--neon-red); font-size:1.1rem; cursor:pointer; font-weight:900;">X</button>
            </h2>

            <div id="auto-config-notice" class="config-auto-indicator" style="display: none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                AUTO-CONFIGURED: Environment config loaded!
            </div>
            
            <div class="form-group form-group-amber">
                <label for="gh-token" class="neon-amber">GitHub Classic Token (PAT)</label>
                <input type="text" id="gh-token" placeholder="github_pat_...">
            </div>
            
            <div class="form-row">
                <div class="form-group form-group-amber">
                    <label for="gh-owner" class="neon-amber">GH Username</label>
                    <input type="text" id="gh-owner" placeholder="e.g. MyGithubUser">
                </div>
                <div class="form-group form-group-amber">
                    <label for="gh-repo" class="neon-amber">GH Repository</label>
                    <input type="text" id="gh-repo" value="3nc0d3r">

            <div class="form-group form-group-amber" style="margin-top: 1.2rem; border-top: 1px dashed rgba(245, 158, 11, 0.2); padding-top: 1.2rem;">

                <input type="text" id="redis-url" placeholder="https://...upstash.io">
            </div>

            <div class="form-group form-group-amber">
                <label for="redis-token" class="neon-amber">Upstash Redis REST Token</label>
                <input type="text" id="redis-token" placeholder="REST Access Token...">
            </div>

            <button class="cyber-button cyber-button-amber" onclick="saveCredentials()" style="width: 100%; justify-content: center; padding: 0.9rem; margin-top: 1rem;">
                Authenticate & Sync
            </button>
        </div>
    </div>

    <!-- Toast Notifications Area -->
    <div id="toast-container" class="toast-container"></div>

    <script>
        let pollInterval = null;

        // Custom resolution block toggle
        function toggleCustomResolution() {
            const select = document.getElementById('resolution');
            const customBox = document.getElementById('custom-resolution-box');
            if (select.value === 'custom') {
                customBox.style.display = 'block';
            } else {
                customBox.style.display = 'none';
            }
        }

        // Audio bitrate dropdown toggle
        function toggleAudioBitrate() {
            const select = document.getElementById('audio-mode');
            const bitrateBox = document.getElementById('audio-bitrate-box');
            if (select.value === 'opus') {
                bitrateBox.style.display = 'block';
            } else {
                bitrateBox.style.display = 'none';
            }
        }

        // Toggle structured anime rename accordion
        function toggleAnimeRename() {
            const fields = document.getElementById('anime-rename-fields');
            const arrow = document.getElementById('anime-arrow');
            if (fields.style.display === 'none') {
                fields.style.display = 'flex';
                arrow.style.transform = 'rotate(180deg)';
            } else {
                fields.style.display = 'none';
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        // Range input value viewer
        function updateSliderVal(id) {
            const range = document.getElementById(id);
            const label = document.getElementById(id + '-val');
            label.textContent = range.value;
        }

        // Modal visibility
        function toggleConfigPopup(show) {
            const overlay = document.getElementById('config-overlay');
            if (show) {
                overlay.classList.add('open');
            } else {
                overlay.classList.remove('open');
            }
        }

        // Save credentials to localStorage
        function saveCredentials() {
            const pat = document.getElementById('gh-token').value.trim();
            const owner = document.getElementById('gh-owner').value.trim();
            const repo = document.getElementById('gh-repo').value.trim();
            const redisUrl = document.getElementById('redis-url').value.trim();
            const redisToken = document.getElementById('redis-token').value.trim();

            if (!pat || !owner || !repo) {
                showToast("GitHub credentials are required to launch encodes!", "error");
                return;
            }

            localStorage.setItem('3nc0d3r_gh_token', pat);
            localStorage.setItem('3nc0d3r_gh_owner', owner);
            localStorage.setItem('3nc0d3r_gh_repo', repo);
            localStorage.setItem('3nc0d3r_redis_url', redisUrl);
            localStorage.setItem('3nc0d3r_redis_token', redisToken);

            showToast("System credentials authenticated successfully!");
            toggleConfigPopup(false);
            startMonitoring();
        }

        // Load credentials from local config.json file (Auto-Configuration) or localStorage
        async function loadCredentials() {
            let pat = localStorage.getItem('3nc0d3r_gh_token') || '';
            let owner = localStorage.getItem('3nc0d3r_gh_owner') || '';
            let repo = localStorage.getItem('3nc0d3r_gh_repo') || '3nc0d3r';
            let redisUrl = localStorage.getItem('3nc0d3r_redis_url') || '';
            let redisToken = localStorage.getItem('3nc0d3r_redis_token') || '';

            // Attempt to load from the server config.json (hassle-free auto configuration!)
            try {
                const res = await fetch('/config.json');
                if (res.ok) {
                    const localConfig = await res.json();
                    let autoConfigured = false;
                    
                    if (localConfig.gh_token && !pat) { pat = localConfig.gh_token; autoConfigured = true; }
                    if (localConfig.gh_owner && !owner) { owner = localConfig.gh_owner; autoConfigured = true; }
                    if (localConfig.gh_repo && repo === '3nc0d3r') { repo = localConfig.gh_repo; autoConfigured = true; }
                    if (localConfig.redis_url && !redisUrl) { redisUrl = localConfig.redis_url; autoConfigured = true; }
                    if (localConfig.redis_token && !redisToken) { redisToken = localConfig.redis_token; autoConfigured = true; }
                    
                    if (autoConfigured) {
                        localStorage.setItem('3nc0d3r_gh_token', pat);
                        localStorage.setItem('3nc0d3r_gh_owner', owner);
                        localStorage.setItem('3nc0d3r_gh_repo', repo);
                        localStorage.setItem('3nc0d3r_redis_url', redisUrl);
                        localStorage.setItem('3nc0d3r_redis_token', redisToken);
                        
                        document.getElementById('auto-config-notice').style.display = 'flex';
                        showToast("Hassle-Free Credentials auto-loaded from workspace!", "success");
                    }
                }
            } catch (e) {
                console.log("No config.json found or server did not respond.");
            }

            document.getElementById('gh-token').value = pat;
            document.getElementById('gh-owner').value = owner;
            document.getElementById('gh-repo').value = repo;
            document.getElementById('redis-url').value = redisUrl;
            document.getElementById('redis-token').value = redisToken;

            // If still missing GitHub PAT, open credentials modal
            if (!pat || !owner) {
                toggleConfigPopup(true);
            } else {
                startMonitoring();
            }
        }

        // Show Toast Notifications
        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === "error" ? "toast-error" : "toast-success"}`;
            
            const icon = type === "success" 
                ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--neon-green);"><polyline points="20 6 9 17 4 12"></polyline></svg>`
                : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--neon-red);"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Form Submit: Trigger workflow on GHA
        async function handleFormSubmit(event) {
            event.preventDefault();
            
            const pat = localStorage.getItem('3nc0d3r_gh_token');
            const owner = localStorage.getItem('3nc0d3r_gh_owner');
            const repo = localStorage.getItem('3nc0d3r_gh_repo');

            if (!pat || !owner || !repo) {
                showToast("Missing authenticated credentials! Open resolvers setup.", "error");
                toggleConfigPopup(true);
                return;
            }

            const videoUrl = document.getElementById('video-url').value.trim();
            const customName = document.getElementById('custom-name').value.trim();
            
            // Handle Custom vs Pre-set resolution
            let resolution = document.getElementById('resolution').value;
            if (resolution === 'custom') {
                resolution = document.getElementById('custom-res-val').value.trim();
                if (!resolution) {
                    showToast("Please enter a custom height!", "error");
                    return;
                }
            }

            const audioMode = document.getElementById('audio-mode').value;
            let audioBitrate = '48k';
            if (audioMode === 'opus') {
                audioBitrate = document.getElementById('audio-bitrate').value;
            }

            const crf = document.getElementById('crf').value;
            const preset = document.getElementById('preset').value;
            const grain = document.getElementById('grain').value;
            const runVmaf = document.getElementById('run-vmaf').checked ? "true" : "false";
            const runUpload = document.getElementById('run-upload').checked ? "true" : "false";

            // Anime rename parameters
            const animeName = document.getElementById('anime-name').value.trim();
            const season = document.getElementById('season').value.trim();
            const episode = document.getElementById('episode').value.trim();
            const audioType = document.getElementById('audio-type').value;
            const contentType = document.getElementById('content-type').value;

            const payload = {
                ref: "main",
                inputs: {
                    video_url: videoUrl,
                    custom_name: customName,
                    res_choice: resolution,
                    custom_crf: crf,
                    custom_preset: preset,
                    film_grain: grain,
                    audio_mode: audioMode,
                    audio_bitrate: audioBitrate,
                    run_vmaf: runVmaf,
                    run_upload: runUpload,
                    anime_name: animeName,
                    season: season,
                    episode: episode,
                    audio_type: audioType,
                    content_type: contentType
                }
            };

            showToast("Transmitting launch sequence...", "success");

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/encode.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${pat}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok || response.status === 204) {
                    showToast("🚀 Pipeline engaged! Cores running.", "success");
                    document.getElementById('pipeline-form').reset();
                    // Reset sliders and toggles
                    updateSliderVal('crf');
                    updateSliderVal('preset');
                    updateSliderVal('grain');
                    toggleCustomResolution();
                    toggleAudioBitrate();
                    
                    setTimeout(pollGitHubRuns, 3000);
                } else {
                    const data = await response.json();
                    showToast(`Launch failed: ${data.message || response.statusText}`, "error");
                }
            } catch (err) {
                showToast(`Launch exception: ${err.message}`, "error");
            }
        }

        // Formats duration seconds to HH:MM:SS
        function formatSeconds(secs) {
            if (!secs || isNaN(secs)) return "00:00:00";
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = Math.floor(secs % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        // Upstash Redis REST fetch helper
        async function fetchRedisKey(key) {
            const redisUrl = localStorage.getItem('3nc0d3r_redis_url');
            const redisToken = localStorage.getItem('3nc0d3r_redis_token');
            if (!redisUrl || !redisToken) return null;

            try {
                const cleanUrl = redisUrl.replace(/\/$/, "");
                const response = await fetch(`${cleanUrl}/get/${key}`, {
                    headers: {
                        'Authorization': `Bearer ${redisToken}`
                    }
                });
                if (!response.ok) return null;
                const data = await response.json();
                if (data && data.result) {
                    return JSON.parse(data.result);
                }
            } catch (e) {
                console.error("Redis fetch failed:", e);
            }
            return null;
        }

        // Cancel GHA workflow run
        async function cancelRun(runId) {
            const pat = localStorage.getItem('3nc0d3r_gh_token');
            const owner = localStorage.getItem('3nc0d3r_gh_owner');
            const repo = localStorage.getItem('3nc0d3r_gh_repo');

            if (!confirm(`Confirm GHA cancellation for Run #${runId}?`)) return;

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs/${runId}/cancel`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${pat}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.ok) {
                    showToast(`⚠️ Run #${runId} cancellation sent.`, "success");
                    pollGitHubRuns();
                } else {
                    showToast(`Cancellation rejected.`, "error");
                }
            } catch (err) {
                showToast(`Error: ${err.message}`, "error");
            }
        }

        // Poll GitHub Runs and Upstash Redis Statuses
        async function pollGitHubRuns() {
            const pat = localStorage.getItem('3nc0d3r_gh_token');
            const owner = localStorage.getItem('3nc0d3r_gh_owner');
            const repo = localStorage.getItem('3nc0d3r_gh_repo');

            if (!pat || !owner || !repo) return;

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?workflow=encode.yml&per_page=6`, {
                    headers: {
                        'Authorization': `token ${pat}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) return;
                const data = await response.json();
                
                const runs = data.workflow_runs || [];
                const listContainer = document.getElementById('runs-list');
                const emptyState = document.getElementById('empty-state');

                if (runs.length === 0) {
                    listContainer.innerHTML = '';
                    emptyState.style.display = 'flex';
                    return;
                }

                emptyState.style.display = 'none';
                let newHtml = '';

                for (let run of runs) {
                    let redisState = null;
                    if (run.status === 'in_progress' || run.status === 'completed') {
                        redisState = await fetchRedisKey(`encode:${run.id}`);
                    }

                    let badgeClass = 'badge-queued';
                    let statusLabel = run.status;
                    let percent = 0;
                    let speed = 'N/A';
                    let eta = 'N/A';
                    let elapsed = 'N/A';
                    let vmaf = 'N/A';
                    let size = 'N/A';
                    let cpu = null;
                    let ram = null;
                    let phase = 'QUEUED';

                    if (run.status === 'queued') {
                        badgeClass = 'badge-queued';
                        phase = 'QUEUEING';
                    } else if (run.status === 'in_progress') {
                        badgeClass = 'badge-active';
                        statusLabel = 'ACTIVE';
                        phase = 'INITIALIZING';
                    } else if (run.status === 'completed') {
                        if (run.conclusion === 'success') {
                            badgeClass = 'badge-success';
                            statusLabel = 'SUCCESS';
                            phase = 'FINISHED';
                            percent = 100;
                        } else {
                            badgeClass = 'badge-failed';
                            statusLabel = 'FAILED';
                            phase = 'CRASHED';
                        }
                    }

                    if (redisState) {
                        percent = redisState.percent ? Math.min(100, redisState.percent) : percent;
                        speed = redisState.speed || speed;
                        eta = redisState.eta ? formatSeconds(redisState.eta) : eta;
                        elapsed = redisState.elapsed ? formatSeconds(redisState.elapsed) : elapsed;
                        vmaf = redisState.vmaf || vmaf;
                        size = redisState.size_mb ? `${redisState.size_mb.toFixed(2)} MB` : size;
                        cpu = redisState.cpu || cpu;
                        ram = redisState.ram || ram;
                        phase = redisState.phase || phase;
                        
                        if (redisState.status === 'failed') {
                            badgeClass = 'badge-failed';
                            statusLabel = 'CRASHED';
                        }
                    }

                    let resourceHtml = '';
                    if (cpu !== null && ram !== null) {
                        resourceHtml = `
                            <div class="resources-row">
                                <div class="resource-mini-bar">
                                    <span style="color:var(--neon-cyan);">CPU: ${cpu.toFixed(1)}%</span>
                                    <div class="mini-progress">
                                        <div class="mini-fill" style="width: ${cpu}%; background: var(--neon-cyan);"></div>
                                    </div>
                                </div>
                                <div class="resource-mini-bar">
                                    <span style="color:var(--neon-amber);">RAM: ${ram.toFixed(1)}%</span>
                                    <div class="mini-progress">
                                        <div class="mini-fill" style="width: ${ram}%; background: var(--neon-amber);"></div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }

                    newHtml += `
                        <div class="run-card">
                            <div class="run-card-header">
                                <div class="run-title">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--neon-cyan);"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                                    Mission #${run.run_number} (${phase})
                                </div>
                                <span class="run-badge ${badgeClass}">${statusLabel}</span>
                            </div>

                            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1.2rem; font-family: monospace; word-break: break-all;">
                                📡 ID: ${run.id}
                            </div>

                            <div class="run-stats-grid">
                                <div class="stat-item">
                                    <div class="stat-label" style="color: var(--neon-green);">VMAF Score</div>
                                    <div class="stat-value neon-green">${vmaf}</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">Encoding FPS</div>
                                    <div class="stat-value neon-cyan">${speed}</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label">Output Size</div>
                                    <div class="stat-value">${size}</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-label" style="color: var(--neon-amber);">ETA Time</div>
                                    <div class="stat-value neon-amber">${eta}</div>
                                </div>
                            </div>

                            <div class="progress-bar-wrapper">
                                <div class="progress-bar-labels">
                                    <span>CORES ACTIVE</span>
                                    <span style="font-family: 'Orbitron', sans-serif; font-weight: 900; color: var(--neon-cyan);">${percent.toFixed(1)}%</span>
                                </div>
                                <div class="progress-container">
                                    <div class="progress-fill" style="width: ${percent}%;"></div>
                                </div>
                            </div>

                            ${resourceHtml}

                            <div class="card-actions">
                                <a class="card-btn" href="${run.html_url}" target="_blank">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                                    CONSOLE LOG
                                </a>
                                ${run.status === 'in_progress' ? `
                                    <button class="card-btn card-btn-danger" onclick="cancelRun(${run.id})">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                                        KILL RUN
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }

                listContainer.innerHTML = newHtml;

            } catch (err) {
                console.error("Monitor poll error:", err);
            }
        }

        // Start/Stop Polling
        function startMonitoring() {
            if (pollInterval) clearInterval(pollInterval);
            pollGitHubRuns();
            pollInterval = setInterval(pollGitHubRuns, 5000);
        }

        // Initialize dashboard
        window.addEventListener('load', () => {
            loadCredentials();
            updateSliderVal('crf');
            updateSliderVal('preset');
            updateSliderVal('grain');
            toggleCustomResolution();
            toggleAudioBitrate();
        });
    </script>
</body>
</html>
